<script>
    const firebaseConfig = {
  apiKey: "AIzaSyBfhMJfnZQnzHdN8zc8FJV2Ub9IZuy_UrA",
  authDomain: "chat-a7e53.firebaseapp.com",
  databaseURL: "https://chat-a7e53-default-rtdb.firebaseio.com",
  projectId: "chat-a7e53",

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    function login() {
        auth.signInWithPopup(googleProvider);
    }

    auth.onAuthStateChanged(function(user) {
        if (user) {
            db.ref('users/' + user.uid + '/nickname').once('value', function(snap) {
                if (snap.exists()) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('nickname-form').style.display = 'none';
                    document.getElementById('chat-container').style.display = 'block';
                    loadMessages();
                } else {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('nickname-form').style.display = 'block';
                }
            });
        } else {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('nickname-form').style.display = 'none';
            document.getElementById('chat-container').style.display = 'none';
        }
    });

    function saveNickname() {
        const nickname = document.getElementById('nicknameInput').value;
        if (!nickname) return alert('Введи никнейм!');
        const user = auth.currentUser;
        db.ref('users/' + user.uid + '/nickname').set(nickname);
        document.getElementById('nickname-form').style.display = 'none';
        document.getElementById('chat-container').style.display = 'block';
        loadMessages();
    }

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if (!text) return;
        const user = auth.currentUser;
        db.ref('users/' + user.uid + '/nickname').once('value', function(snap) {
            const nickname = snap.val();
            db.ref('messages').push({
                nickname: nickname,
                text: text,
                timestamp: Date.now()
            });
        });
        document.getElementById('msgInput').value = '';
    }

    function loadMessages() {
        db.ref('messages').orderByChild('timestamp').on('child_added', function(snapshot) {
            const msg = snapshot.val();
            const div = document.getElementById('messages');
            div.innerHTML += `<p><b>${msg.nickname}:</b> ${msg.text}</p>`;
            div.scrollTop = div.scrollHeight;
        });
    }
</script>
